<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스마트 문법 테스트</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>스마트 문법 테스트</h1>
    <p>영문법을 쉽고 재미있게 연습할 수 있는 웹사이트입니다.</p>
    <a class="btn" href="#">시작하기</a>
  </div>
</body>
</html>
